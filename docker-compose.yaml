version: "3.9"

services:
  jobforge:
    build: .
    env_file: .env
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    command: python scripts/run_pipeline.py

  # Scout-only test mode
  scout-test:
    build: .
    env_file: .env
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    command: python scripts/run_pipeline.py --scout-only
    profiles:
      - test
